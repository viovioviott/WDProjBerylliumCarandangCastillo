    <script>

function loadNotes() { // this is to load the data
const KEY = "notes";
const raw = localStorage.getItem(KEY); 

if (raw) {
  return JSON.parse(raw); // if there is saved data on the key "notes", parse and return it
} else {
  return []; // if none, return a blank array
}
};

// filters
let filter = '';
let arrange = '';
let loaded = 0;


// Render list to the page
function render() {
  const rawnotes = loadNotes()
  const notes = rawnotes.at(-1).data;
  const list = document.getElementById('list');

  if ((localStorage.getItem("record") == "out")||(localStorage.getItem("record") != "in")) { // if there are no current save data, display no notes yet
    list.innerHTML = `<tr><th colspan="4"><b>Log in to access this feature.</b></th></tr>`;
    
  }
  else {

    let output =
      `<tr>
        <th>EVENT</th>
        <th>DATE EXPECTED</th>
        <th>DATE CREATED</th>
        <th>LOCATION</th>
      </tr>`;
         
    let existinginstances = 0;
    let numberperevent = 0;
     
    for (let i = 0; i < notes.length; i++) { // once there is data, display it in a table
      if ((filter == "All") || (filter == notes[i][0])) {
        numberperevent += 1;
      };
    };
     
    if (numberperevent != 0) {

      for (let i = 0; i < notes.length; i++) { // once there is data, display it in a table
        if ((filter == "All") || (filter == notes[i][0])) {
          output += `<tr>
            <td>${notes[i][0]}</td>
            <td>${notes[i][1]}</td>
            <td>${notes[i][2]}</td>
            <td>${notes[i][3]}</td>
          </tr>`;
        };
      };


    } else {
      if ((existinginstances == 0)) {
        output = `<tr><th colspan="4"><b>No events created yet under this type.</b></th></tr>`;
        existinginstances += 1;
      }
    };


    list.innerHTML = output;
  };



};



render();



document.getElementById('filter').onclick = function(event) { // filter out the students
  filter = document.getElementById('filter').value.trim();
  render();
};

document.getElementById('arrange').onclick = function(event) { // filter out the students
  arrange = document.getElementById('arrange').value.trim();
  render();
};


    </script>
